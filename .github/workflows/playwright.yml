name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Nightly run: 1:00 AM UTC every day
    - cron: "0 2 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TESTMO_URL: ${{ secrets.TESTMO_URL }}
  TESTMO_TOKEN: ${{ secrets.TESTMO_TOKEN }}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        id: playwright
        run: npx playwright test
        continue-on-error: true

      - name: Generate Allure Report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Setup GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Allure Report to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Playwright Tests - ${{ steps.playwright.outcome }} - ${{ github.repository }}"
          to: ${{ secrets.MAIL_TO }}
          from: GitHub Actions <${{ secrets.MAIL_USERNAME }}>
          html_body: |
            <h2>Playwright Test Execution</h2>
            <p><strong>Test status:</strong> ${{ steps.playwright.outcome }}</p>
            <p><strong>Repository:</strong> ${{ github.repository }}</p>
            <p><strong>Branch:</strong> ${{ github.ref_name }}</p>
            <p><strong>Triggered by:</strong> ${{ github.actor }}</p>
            <p><strong>Commit:</strong> ${{ github.sha }}</p>
            <p><a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View GitHub Actions Run</a></p>
            <p>The Allure report is published through GitHub Pages when this run is not a pull request.</p>

      - name: Create Testmo resources
        if: always()
        run: |
          npx testmo automation:resources:add-link \
            --name "GitHub Actions Run" \
            --url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --resources resources.json

          npx testmo automation:resources:add-link \
            --name "Allure Report - GitHub Pages" \
            --url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" \
            --resources resources.json

          npx testmo automation:resources:add-link \
            --name "Commit" \
            --url "https://github.com/${{ github.repository }}/commit/${{ github.sha }}" \
            --resources resources.json

      - name: Submit results to Testmo
        if: always()
        run: |
          npx testmo automation:run:submit \
            --instance "$TESTMO_URL" \
            --project-id 1 \
            --name "Playwright tests - GitHub Actions" \
            --source "Playwright" \
            --resources resources.json \
            --results test-results/results.xml

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Allure Report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
